<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./signup.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <main>
        <article class="signup_part">
            <section class="logo_part"></section>
            <section class="signup_form">
                <h2 class="stargram_description">친구들의 사진과 동영상을 보려면 가입하세요.</h2>
                <form method="post" action="">
                    <div class="signup_div"><input type="text" placeholder="이메일 주소"/></div>
                    <div class="signup_div"><input type="text" placeholder="사용자 이름"/></div>
                    <div class="signup_div"><input type="text" placeholder="아이디"/></div>
                    <div class="signup_div"><input type="password" placeholder="비밀번호"/></div>
                    <div class="signup_div"><input type="password" placeholder="비밀번호 확인"/></div>
                    <button type="submit"><div class="signup_btn">가입</div></button>
                </form>
            </section>
        </article>
        <article class="account_exist">
            <p>계정이 있으신가요? <a href="">로그인</a></p>
        </article>
    </main>
</body>
</html>
