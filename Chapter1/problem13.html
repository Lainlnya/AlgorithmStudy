    <script>
        'use strict';
        function solution(arr){
            arr = Array.from(arr);
            for( let i = 0; i < arr.length; ++i){
                if( arr[i].charCodeAt() >= 97 && arr[i].charCodeAt() <= 122){
                    arr[i] = arr[i].charCodeAt() - 32;
                    arr[i] = String.fromCharCode(arr[i]);
                }else{
                    arr[i] = arr[i].charCodeAt() + 32;
                    arr[i] = String.fromCharCode(arr[i])
                }
            }
            arr = arr.join('');
            return arr;
        }
