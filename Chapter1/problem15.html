    <script>
        function solution(arr){
            arr = Array.from(arr);
            let middleString = [];
            if( arr.length % 2 != 0){
                middleString.push(arr[Math.round(arr.length/2) - 1]);
            }else{
                middleString.push(arr[arr.length/2 -1]);
                middleString.push(arr[arr.length/2]);
            }
            
            middleString = middleString.join('');
            return middleString;
        }
