<body>
    <script>
        function solution(a, b, c){
            let answer = 0;
            if(a > b){
                answer = (b > c) ? a : (a < c) ? c - (a + b) : a - (b + c)
            }else{
                answer = (b < c) ? c - (a + b) : b - (a + c) 
            }
            return (answer < 0) ? "YES" : "NO"
