    <script>
        'use strict';
        function solution(arr){
            let sum = 0;
            let int1 = Math.floor(Math.random() * 10);
            let int2 = Math.floor(Math.random() * 10);
            for( let i = 0; i < arr.length; ++i){
                sum += arr[i];
            }
            if((arr[int1] + arr[int2]) >= 40){
                arr.splice(int1, 1);
                arr.splice(int2, 1);
                return arr;
            }else{
                return "x";
            }
            
        }
        console.log(solution([20, 7, 23, 19, 10, 15, 25, 8, 13]));
    </script>
