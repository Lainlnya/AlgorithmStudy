<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function solution(arr){
            let minNum, totalSum = 0;
            let tempArr = [];
            for( let i of arr){
                if(i % 2 == 0) continue;
                else tempArr.push(i);
            }
            minNum = tempArr[0];
            
            for( let i of tempArr){
                minNum = minNum < i ? minNum : i
                totalSum += i;
            }
            return `${totalSum}\n${minNum}`;
        }
        console.log(solution([12, 77, 38, 41, 53, 92, 85]));

    </script>
</body>
</html>
