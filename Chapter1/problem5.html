<body>
    <script>
        'use strict';
        function solution(arrayNum){
            const arr = arrayNum.split(" ");
            let minNum = arr[0];
            console.log(arr);
            for(let i = 0; i < arr.length; ++i){
                arr[i] = parseInt(arr[i]);
                minNum = minNum > arr[i] ? arr[i] : minNum;
            }
            return minNum;
        }
        console.log(solution('5 3 7 11 2 15 17'));
    </script>
</body>
