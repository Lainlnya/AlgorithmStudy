<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1부터 n까지 더하기</title>
</head>
<body>
    <script>
        'use strict';
        function solution(num){
            let answer = 0;
            for(let i = 1; i <= num; ++i){
                answer += i;
            }
            return answer;
        }
        console.log(solution(6));
        console.log(solution(10));
    </script>
</body>
</html>
