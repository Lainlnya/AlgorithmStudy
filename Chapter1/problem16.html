  <body>
    <script>
      function solution(arr) {
        let tempArr = [];
        arr = Array.from(arr);
        arr.forEach((element) => {
          if (!tempArr.includes(element)) {
            tempArr.push(element);
          }
        });
        arr = tempArr.join('');
        return arr;
