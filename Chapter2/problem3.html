<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        'use strict';
        function solution(arrA, arrB){
            let answer = [];
            for( let i = 0; i < arrA.length; ++i){
                switch(arrA[i]){
                    case 1:
                        arrB[i] == 1 ? answer.push("D") : arrB[i] == 2 ? answer.push("B") : answer.push("A");
                        break;
                    case 2:
                        arrB[i] == 1 ? answer.push("A") : arrB[i] == 2 ? answer.push("D") : answer.push("B");
                        break;
                    case 3:
                        arrB[i] == 1 ? answer.push("B") : arrB[i] == 2 ? answer.push("A") : answer.push("D");
                        break;
                }
            }
            return answer;
        }   
        console.log(solution([2, 3, 3, 1, 3], [1, 1, 2, 2, 3]));
    </script>
</body>
</html>
