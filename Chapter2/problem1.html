<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

  <body>
    <script>
      //선생님 코드와 동일
      'use strict';
      function solution(tempArr) {
        let answer = [];
        answer.push(tempArr[0]);
        for (let i = 1; i < tempArr.length - 1; ++i) {
          if (tempArr[i] < tempArr[i + 1]) answer.push(tempArr[i + 1]);
        }
        return answer;
      }
      console.log(solution([7, 3, 9, 5, 6, 12]));
    </script>
  </body>
