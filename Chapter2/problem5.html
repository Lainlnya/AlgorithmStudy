    <script>
        'use strict';
        function solution(arr){
            let answer = [];
            let scoreKorean = 1;
            let maxNum = Math.max(arr);
            for(let i = 0; i < arr.length; ++i){
                for(let j = 0; j < arr.length; ++j){
                    if( i != j && arr[i] < arr[j]) 
                    scoreKorean++;
                }
                answer.push(scoreKorean);
                scoreKorean = 1;
            }
            return answer;
        }
        console.log(solution([87, 89, 92, 100, 76]));
        console.log(solution([92, 92, 92, 100, 76]));
    </script>
