<!DOCTYPE html>

    <meta charset="UTF-8" />

  <body>
    <script>
      'use strict';
      function solution(arr) {
        let answer = 1;
        let maxHeight = arr[0];
        for( let i = 0; i < arr.length -1; ++i){
            maxHeight = (arr[i] > maxHeight) ? arr[i] : maxHeight;

            if(arr[i] < arr[i+1] && arr[i+1] > maxHeight) {
                answer++;
            }
        }
        // 선생님 풀이
        // for (let i = 0; i < arr.length; ++i) {
        //   if (arr[i] > maxHeight) {
        //     answer++;
        //     maxHeight = arr[i];
        //   }
        // }
        return answer;
      }
      console.log(solution([130, 135, 148, 140, 145, 150, 150, 153]));
    </script>
  </body>
</html>
